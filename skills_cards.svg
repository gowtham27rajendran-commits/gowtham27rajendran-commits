<svg viewBox="0 0 820 340" xmlns="http://www.w3.org/2000/svg" width="820" height="340">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&amp;display=swap');
      .cat-label {
        font-family: 'DM Sans', sans-serif;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 3px;
        fill: #c9a84c;
        text-transform: uppercase;
      }
      .skill-text {
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        font-weight: 400;
        fill: #cdd9e5;
      }
      .card {
        fill: #161b22;
        stroke: #30363d;
        stroke-width: 0.5;
        rx: 6;
      }
      .card-hover {
        fill: #1c2430;
        stroke: #c9a84c;
        stroke-width: 0.5;
      }
      .icon-dot { fill: #c9a84c; }
      .section-title {
        font-family: 'DM Sans', sans-serif;
        font-size: 11px;
        font-weight: 300;
        fill: #8b949e;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* Card appear animations - staggered */
      .skill-card { opacity: 0; animation: cardReveal 0.5s ease forwards; }
      .c0  { animation-delay: 0.0s; }
      .c1  { animation-delay: 0.08s; }
      .c2  { animation-delay: 0.16s; }
      .c3  { animation-delay: 0.24s; }
      .c4  { animation-delay: 0.32s; }
      .c5  { animation-delay: 0.40s; }
      .c6  { animation-delay: 0.48s; }
      .c7  { animation-delay: 0.56s; }
      .c8  { animation-delay: 0.64s; }
      .c9  { animation-delay: 0.72s; }
      .c10 { animation-delay: 0.80s; }
      .c11 { animation-delay: 0.88s; }
      .c12 { animation-delay: 0.96s; }
      .c13 { animation-delay: 1.04s; }
      .c14 { animation-delay: 1.12s; }
      .c15 { animation-delay: 1.20s; }
      .c16 { animation-delay: 1.28s; }
      .c17 { animation-delay: 1.36s; }
      .c18 { animation-delay: 1.44s; }
      .c19 { animation-delay: 1.52s; }

      @keyframes cardReveal {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Pulse dot animation */
      .pulse-dot {
        animation: pulseDot 2s ease-in-out infinite;
      }
      @keyframes pulseDot {
        0%, 100% { opacity: 1; r: 3; }
        50%       { opacity: 0.4; r: 4; }
      }

      /* Section headers fade */
      .sec-head { opacity: 0; animation: fadeIn 0.5s ease forwards; }
      .sh0 { animation-delay: 0.0s; }
      .sh1 { animation-delay: 0.45s; }
      .sh2 { animation-delay: 0.95s; }
      .sh3 { animation-delay: 1.45s; }
      @keyframes fadeIn {
        to { opacity: 1; }
      }
    </style>

    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <rect width="820" height="340" fill="#0d1117" rx="8"/>
  <rect x="0" y="0" width="820" height="1" fill="#c9a84c" opacity="0.3"/>

  <!-- ── SECTION: Languages ── -->
  <text class="section-title sec-head sh0" x="20" y="28">Languages</text>
  <!-- Row 1: Java · Python · SQL · Go · JavaScript -->
  <!-- Card helper: x, y, w=140, h=36, label -->
  <!-- Java -->
  <g class="skill-card c0" transform="translate(20,36)">
    <rect width="140" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" class="icon-dot pulse-dot" style="animation-delay:0.1s"/>
    <text class="skill-text" x="28" y="23">Java</text>
  </g>
  <!-- Python -->
  <g class="skill-card c1" transform="translate(168,36)">
    <rect width="140" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" class="icon-dot pulse-dot" style="animation-delay:0.4s"/>
    <text class="skill-text" x="28" y="23">Python</text>
  </g>
  <!-- SQL -->
  <g class="skill-card c2" transform="translate(316,36)">
    <rect width="140" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" class="icon-dot pulse-dot" style="animation-delay:0.7s"/>
    <text class="skill-text" x="28" y="23">SQL</text>
  </g>
  <!-- Go -->
  <g class="skill-card c3" transform="translate(464,36)">
    <rect width="140" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" class="icon-dot pulse-dot" style="animation-delay:1.0s"/>
    <text class="skill-text" x="28" y="23">Go</text>
  </g>
  <!-- JavaScript -->
  <g class="skill-card c4" transform="translate(612,36)">
    <rect width="188" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" class="icon-dot pulse-dot" style="animation-delay:1.3s"/>
    <text class="skill-text" x="28" y="23">JavaScript</text>
  </g>

  <!-- ── SECTION: Distributed Systems ── -->
  <text class="section-title sec-head sh1" x="20" y="104">Distributed Systems</text>
  <!-- Kafka · Spark · Kafka Streams · Event-Driven · Microservices -->
  <g class="skill-card c5" transform="translate(20,112)">
    <rect width="140" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" fill="#e3742f" class="pulse-dot" style="animation-delay:0.2s"/>
    <text class="skill-text" x="28" y="23">Apache Kafka</text>
  </g>
  <g class="skill-card c6" transform="translate(168,112)">
    <rect width="140" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" fill="#e3742f" class="pulse-dot" style="animation-delay:0.5s"/>
    <text class="skill-text" x="28" y="23">Apache Spark</text>
  </g>
  <g class="skill-card c7" transform="translate(316,112)">
    <rect width="148" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" fill="#e3742f" class="pulse-dot" style="animation-delay:0.8s"/>
    <text class="skill-text" x="28" y="23">Event-Driven Arch</text>
  </g>
  <g class="skill-card c8" transform="translate(472,112)">
    <rect width="140" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" fill="#e3742f" class="pulse-dot" style="animation-delay:1.1s"/>
    <text class="skill-text" x="28" y="23">Microservices</text>
  </g>

  <!-- ── SECTION: Backend & Databases ── -->
  <text class="section-title sec-head sh2" x="20" y="180">Backend &amp; Databases</text>
  <g class="skill-card c9" transform="translate(20,188)">
    <rect width="140" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" fill="#6366f1" class="pulse-dot" style="animation-delay:0.3s"/>
    <text class="skill-text" x="28" y="23">Spring Boot</text>
  </g>
  <g class="skill-card c10" transform="translate(168,188)">
    <rect width="140" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" fill="#6366f1" class="pulse-dot" style="animation-delay:0.6s"/>
    <text class="skill-text" x="28" y="23">FastAPI · Flask</text>
  </g>
  <g class="skill-card c11" transform="translate(316,188)">
    <rect width="140" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" fill="#6366f1" class="pulse-dot" style="animation-delay:0.9s"/>
    <text class="skill-text" x="28" y="23">PostgreSQL</text>
  </g>
  <g class="skill-card c12" transform="translate(464,188)">
    <rect width="140" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" fill="#6366f1" class="pulse-dot" style="animation-delay:1.2s"/>
    <text class="skill-text" x="28" y="23">Redis · MongoDB</text>
  </g>

  <!-- ── SECTION: Cloud, AI & Observability ── -->
  <text class="section-title sec-head sh3" x="20" y="256">Cloud · AI · Observability</text>
  <g class="skill-card c13" transform="translate(20,264)">
    <rect width="140" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" fill="#3ddc84" class="pulse-dot" style="animation-delay:0.15s"/>
    <text class="skill-text" x="28" y="23">AWS · Docker</text>
  </g>
  <g class="skill-card c14" transform="translate(168,264)">
    <rect width="140" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" fill="#3ddc84" class="pulse-dot" style="animation-delay:0.45s"/>
    <text class="skill-text" x="28" y="23">Kubernetes</text>
  </g>
  <g class="skill-card c15" transform="translate(316,264)">
    <rect width="148" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" fill="#3ddc84" class="pulse-dot" style="animation-delay:0.75s"/>
    <text class="skill-text" x="28" y="23">OpenTelemetry</text>
  </g>
  <g class="skill-card c16" transform="translate(472,264)">
    <rect width="160" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" fill="#3ddc84" class="pulse-dot" style="animation-delay:1.05s"/>
    <text class="skill-text" x="28" y="23">Prometheus · Grafana</text>
  </g>
  <g class="skill-card c17" transform="translate(640,264)">
    <rect width="160" height="36" rx="6" class="card"/>
    <circle cx="16" cy="18" r="3" fill="#3ddc84" class="pulse-dot" style="animation-delay:1.35s"/>
    <text class="skill-text" x="28" y="23">LLM · FAISS · BERT</text>
  </g>

  <rect x="0" y="339" width="820" height="1" fill="#c9a84c" opacity="0.15"/>
</svg>
