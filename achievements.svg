<svg viewBox="0 0 820 120" xmlns="http://www.w3.org/2000/svg" width="820" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&amp;family=DM+Mono:wght@400&amp;display=swap');
      .metric-num {
        font-family: 'DM Mono', monospace;
        font-size: 26px;
        font-weight: 400;
        fill: #c9a84c;
      }
      .metric-label {
        font-family: 'DM Sans', sans-serif;
        font-size: 11px;
        font-weight: 300;
        letter-spacing: 2px;
        fill: #8b949e;
        text-transform: uppercase;
      }
      .metric-card {
        fill: #161b22;
        stroke: #30363d;
        stroke-width: 0.5;
      }
      .divider { stroke: #30363d; stroke-width: 0.5; }

      /* Card entrance */
      .mc { opacity: 0; animation: mcIn 0.6s cubic-bezier(0.22,1,0.36,1) forwards; }
      .mc0 { animation-delay: 0.1s; }
      .mc1 { animation-delay: 0.3s; }
      .mc2 { animation-delay: 0.5s; }
      .mc3 { animation-delay: 0.7s; }
      @keyframes mcIn {
        from { opacity: 0; transform: translateY(12px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Number count-up shimmer (visual trick — static but gold flash) */
      .num-flash { animation: numFlash 0.4s ease forwards; }
      .nf0 { animation-delay: 0.6s; }
      .nf1 { animation-delay: 0.8s; }
      .nf2 { animation-delay: 1.0s; }
      .nf3 { animation-delay: 1.2s; }
      @keyframes numFlash {
        0%   { fill: #e8c96b; }
        100% { fill: #c9a84c; }
      }

      /* Gold top border animate */
      .gold-line { stroke-dasharray: 190; stroke-dashoffset: 190; animation: lineDraw 0.5s ease forwards; }
      .gl0 { animation-delay: 0.15s; }
      .gl1 { animation-delay: 0.35s; }
      .gl2 { animation-delay: 0.55s; }
      .gl3 { animation-delay: 0.75s; }
      @keyframes lineDraw { to { stroke-dashoffset: 0; } }
    </style>
  </defs>

  <rect width="820" height="120" fill="#0d1117" rx="8"/>
  <rect x="0" y="0" width="820" height="1" fill="#c9a84c" opacity="0.3"/>

  <!-- 4 metric cards evenly spaced: 20, 215, 410, 605 | width=190 -->

  <!-- Card 0: 30% fewer data inconsistencies -->
  <g class="mc mc0" transform="translate(10,10)">
    <rect width="190" height="100" rx="6" class="metric-card"/>
    <line class="gold-line gl0" x1="10" y1="1" x2="180" y2="1" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
    <text class="metric-num num-flash nf0" x="95" y="55" text-anchor="middle">30%</text>
    <text class="metric-label" x="95" y="82" text-anchor="middle">fewer inconsistencies</text>
  </g>

  <!-- Card 1: ~20% latency reduction -->
  <g class="mc mc1" transform="translate(210,10)">
    <rect width="190" height="100" rx="6" class="metric-card"/>
    <line class="gold-line gl1" x1="10" y1="1" x2="180" y2="1" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
    <text class="metric-num num-flash nf1" x="95" y="55" text-anchor="middle">20%</text>
    <text class="metric-label" x="95" y="82" text-anchor="middle">p99 latency reduction</text>
  </g>

  <!-- Card 2: 25% Spark runtime cut -->
  <g class="mc mc2" transform="translate(410,10)">
    <rect width="190" height="100" rx="6" class="metric-card"/>
    <line class="gold-line gl2" x1="10" y1="1" x2="180" y2="1" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
    <text class="metric-num num-flash nf2" x="95" y="55" text-anchor="middle">25%</text>
    <text class="metric-label" x="95" y="82" text-anchor="middle">spark runtime cut</text>
  </g>

  <!-- Card 3: 500+ DSA -->
  <g class="mc mc3" transform="translate(610,10)">
    <rect width="200" height="100" rx="6" class="metric-card"/>
    <line class="gold-line gl3" x1="10" y1="1" x2="190" y2="1" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
    <text class="metric-num num-flash nf3" x="100" y="55" text-anchor="middle">500+</text>
    <text class="metric-label" x="100" y="82" text-anchor="middle">DSA problems solved</text>
  </g>

  <rect x="0" y="119" width="820" height="1" fill="#c9a84c" opacity="0.15"/>
</svg>
