<svg viewBox="0 0 820 140" xmlns="http://www.w3.org/2000/svg" width="820" height="140">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&amp;family=DM+Sans:wght@300;400&amp;display=swap');

      .name-main {
        font-family: 'DM Serif Display', Georgia, serif;
        font-size: 54px;
        fill: #e8e3d8;
        letter-spacing: 3px;
      }
      .name-sub {
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 300;
        fill: #c9a84c;
        letter-spacing: 6px;
        text-transform: uppercase;
      }
      .line-accent {
        stroke: #c9a84c;
        stroke-width: 1;
        fill: none;
      }
      .dot {
        fill: #c9a84c;
      }

      /* Name letter-by-letter fade+rise */
      .letter { opacity: 0; animation: letterIn 0.5s ease forwards; }
      .l0  { animation-delay: 0.1s; }
      .l1  { animation-delay: 0.18s; }
      .l2  { animation-delay: 0.26s; }
      .l3  { animation-delay: 0.34s; }
      .l4  { animation-delay: 0.42s; }
      .l5  { animation-delay: 0.50s; }
      .l6  { animation-delay: 0.58s; }
      .l7  { animation-delay: 0.66s; }
      .l8  { animation-delay: 0.74s; }
      .l9  { animation-delay: 0.82s; }
      .l10 { animation-delay: 0.90s; }
      .l11 { animation-delay: 0.98s; }
      .l12 { animation-delay: 1.06s; }
      .l13 { animation-delay: 1.14s; }
      .l14 { animation-delay: 1.22s; }
      .l15 { animation-delay: 1.30s; }

      @keyframes letterIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Subtitle slide in */
      .subtitle { opacity: 0; animation: subIn 0.7s ease 1.6s forwards; }
      @keyframes subIn {
        from { opacity: 0; letter-spacing: 2px; }
        to   { opacity: 1; letter-spacing: 6px; }
      }

      /* Lines draw in */
      .line-left  { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 0.8s ease 1.5s forwards; }
      .line-right { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 0.8s ease 1.5s forwards; }
      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }

      /* Dots pulse */
      .dot { opacity: 0; animation: dotPop 0.3s ease 1.9s forwards; }
      @keyframes dotPop {
        0%  { opacity: 0; r: 0; }
        60% { r: 5; }
        100%{ opacity: 1; r: 3; }
      }

      /* Shimmer sweep on name after load */
      .shimmer-rect {
        opacity: 0;
        animation: shimmerFade 0.4s ease 2.2s forwards;
      }
      @keyframes shimmerFade {
        0%  { opacity: 0; }
        30% { opacity: 0.18; }
        100%{ opacity: 0; }
      }
    </style>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="50%"  stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#c9a84c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="140" fill="url(#bgGrad)" rx="8"/>
  <!-- Subtle top border line -->
  <rect x="0" y="0" width="820" height="1" fill="#c9a84c" opacity="0.3"/>
  <rect x="0" y="139" width="820" height="1" fill="#c9a84c" opacity="0.15"/>

  <!-- Name — each letter as tspan with class for stagger -->
  <!-- "GOWTHAM RAJENDRAN" -->
  <g transform="translate(410,80)" text-anchor="middle">

    <!-- Letter by letter using individual text elements positioned -->
    <!-- G O W T H A M   R A J E N D R A N -->
    <!-- Total ~18 chars incl space. Using a single text with per-char tspans won't animate individually.
         Instead we pre-calculate positions. Font ~54px serif, approx 32px per char -->

    <text class="name-main" text-anchor="middle" y="0">
      <tspan class="letter l0">G</tspan><tspan class="letter l1">O</tspan><tspan class="letter l2">W</tspan><tspan class="letter l3">T</tspan><tspan class="letter l4">H</tspan><tspan class="letter l5">A</tspan><tspan class="letter l6">M</tspan><tspan class="letter l7"> </tspan><tspan class="letter l8">R</tspan><tspan class="letter l9">A</tspan><tspan class="letter l10">J</tspan><tspan class="letter l11">E</tspan><tspan class="letter l12">N</tspan><tspan class="letter l13">D</tspan><tspan class="letter l14">R</tspan><tspan class="letter l15">A</tspan><tspan class="letter l15">N</tspan>
    </text>

    <!-- Shimmer overlay -->
    <rect class="shimmer-rect" x="-400" y="-55" width="800" height="60" fill="url(#shimmer)"/>
  </g>

  <!-- Decorative lines + dots flanking subtitle -->
  <line class="line-accent line-left"  x1="220" y1="108" x2="330" y2="108"/>
  <line class="line-accent line-right" x1="490" y1="108" x2="600" y2="108"/>
  <circle class="dot" cx="334" cy="108" r="3"/>
  <circle class="dot" cx="486" cy="108" r="3"/>

  <!-- Subtitle -->
  <text class="name-sub subtitle" x="410" y="122" text-anchor="middle">Software Development Engineer</text>
</svg>
